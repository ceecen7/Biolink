<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biolink</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <canvas id="stars-canvas"></canvas>

  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>

  <div class="card" id="card" style="opacity:0;transition:opacity .4s">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar">
        <img id="bio-avatar" src="" alt="" />
      </div>
    </div>

    <!-- Nama -->
    <div class="name"  id="bio-name"></div>
    <div class="handle" id="bio-handle"></div>

    <!-- Bio -->
    <p class="bio" id="bio-text"></p>

    <div class="divider"></div>

    <!-- Links -->
    <div class="links" id="bio-links"></div>

    <div class="footer" id="bio-footer"></div>

  </div>

  <script src="assets/js/app.js"></script>
  <script>
    fetch('/config.json')
      .then(r => r.json())
      .then(cfg => {
        document.title = cfg.name + ' | ' + cfg.handle;

        const avatar = document.getElementById('bio-avatar');
        avatar.src = cfg.avatar || '';
        avatar.alt = cfg.name;

        document.getElementById('bio-name').textContent   = cfg.name;
        document.getElementById('bio-handle').textContent = cfg.handle;
        document.getElementById('bio-text').innerHTML     = cfg.bio.replace(/\n/g, '<br>');
        document.getElementById('bio-footer').textContent = cfg.footer;

        const linksEl = document.getElementById('bio-links');
        linksEl.innerHTML = '';
        (cfg.links || []).forEach(link => {
          const a = document.createElement('a');
          a.href = link.url;
          a.target = '_blank';
          a.rel = 'noopener';
          a.className = 'link-btn ' + link.color;
          a.innerHTML = `
            <div class="link-icon">${link.icon}</div>
            <span class="link-label">${link.label}</span>
            <span class="link-arr">›</span>
          `;
          linksEl.appendChild(a);
        });

        document.getElementById('card').style.opacity = '1';
      })
      .catch(() => {
        document.getElementById('card').style.opacity = '1';
      });
  </script>

</body>
</html>
